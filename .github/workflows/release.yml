name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npx vite build

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          PROJECT=dioptra

          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="${PROJECT}_${GOOS}_${GOARCH}"

            echo "Building ${output}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w -X github.com/tomassar/dioptra/internal/update.Version=${VERSION}" -o "dist/${output}/${PROJECT}" ./cmd/dioptra

            tar -czf "dist/${output}.tar.gz" -C "dist/${output}" "${PROJECT}"
          done

          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
